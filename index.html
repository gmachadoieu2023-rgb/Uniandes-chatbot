<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistente de Retiros — Uniandes</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --surface: #faf9f6;
      --surface2: #efede7;
      --border: #dedad2;
      --text: #1c1a16;
      --text-muted: #7a7568;
      --accent: #c0392b;
      --accent-light: #fdf0ee;
      --accent-mid: #e8998f;
      --bot-bg: #ffffff;
      --user-bg: #1c1a16;
      --user-text: #f5f3ee;
      --radius: 16px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .header-text h1 {
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .header-text p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #27ae60;
      margin-left: auto;
      flex-shrink: 0;
    }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message-row {
      display: flex;
      gap: 10px;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      animation: fadeUp 0.25s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      margin-top: 2px;
    }

    .avatar.bot {
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid var(--accent-mid);
      font-family: 'Sora', sans-serif;
    }

    .avatar.user {
      background: var(--user-bg);
      color: var(--user-text);
    }

    .bubble {
      max-width: calc(100% - 50px);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
    }

    .bubble.bot {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .bubble.user {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .bubble p + p { margin-top: 8px; }
    .bubble strong { font-weight: 500; }
    .bubble a { color: var(--accent); text-decoration: underline; }
    .bubble ol, .bubble ul { padding-left: 18px; margin-top: 6px; }
    .bubble li { margin-bottom: 4px; }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 14px 16px;
      align-items: center;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    .suggestions {
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 0 4px;
    }

    .suggestion-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .suggestion-btn:hover {
      background: var(--surface2);
      border-color: var(--text-muted);
    }

    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .input-row {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      resize: none;
      min-height: 44px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.5;
    }

    #user-input::placeholder { color: var(--text-muted); }
    #user-input:focus { border-color: var(--accent); }

    #send-btn {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }

    #send-btn:hover { opacity: 0.88; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #send-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .disclaimer {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      max-width: 680px;
      margin-inline: auto;
    }

    @media (max-width: 480px) {
      header { padding: 12px 16px; }
      #chat-window { padding: 16px 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  </div>
  <div class="header-text">
    <h1>Asistente de Retiros</h1>
    <p>Universidad de los Andes · Registro académico</p>
  </div>
  <div class="status-dot"></div>
</header>

<div id="chat-window"></div>

<footer>
  <div class="input-row">
    <textarea id="user-input" placeholder="Escribe tu pregunta aquí..." rows="1"></textarea>
    <button id="send-btn" aria-label="Enviar">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <p class="disclaimer">Este asistente no reemplaza la asesoría oficial de la Dirección de Registro.</p>
</footer>

<script>
  const API_KEY = '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';

  const SYSTEM_PROMPT = `You are a customer support chatbot for Universidad de los Andes. Your job is to help students understand how to withdraw a course or withdraw from the term using only official Uniandes information.

Your goals:
- Help students understand the difference between partial withdrawal and total withdrawal.
- Help students figure out whether dropping one class is allowed as a partial withdrawal.
- Explain the step-by-step process to withdraw a course in MiBanner/Banner.
- Help students identify the correct deadline based on the type of courses they are enrolled in.
- Keep responses helpful, concise, practical, and easy to understand.
- If the question is not clearly covered, tell the student to contact the office directly.

Core definitions:
- Partial withdrawal: the student withdraws one or more courses while remaining enrolled in at least one course.
- Total withdrawal: the student withdraws totally or temporarily from the university for the current term.
- If the student wants to drop their last remaining class, do not describe it as a partial withdrawal. Explain that this becomes a total withdrawal.

Official system and process:
- Withdrawals are completed in MiBanner/Banner.
- Banner link: https://experience.elluciancloud.com/udla
- When explaining how to withdraw a course in the system, instruct the student to:
  1. Enter MiBanner/Banner.
  2. Go to the registration or schedule-management area where enrolled classes appear.
  3. Locate the course they want to withdraw.
  4. In the "Movimiento" field, select "Retirado por Web."
  5. Click "Enviar Cambios."
  6. Verify that the schedule updates correctly.

How to reason about a single-course withdrawal:
- If the student is dropping one course and still keeping at least one other course, treat it as a partial withdrawal.
- If the student is dropping the last course in their schedule, explain that it is not a partial withdrawal and must be handled as a total withdrawal.
- Always remind the student to verify that the change was applied in Banner after submitting it.

Deadline logic:
- Do not guess a deadline without first identifying the course period(s).
- Explain that deadlines depend on the type of course(s) the student is enrolled in.
- Relevant course periods may include: first 8-week cycle, second 8-week cycle, 16-week courses, 21-week courses.
- If helpful, walk the student through this logic:
  1. Identify all the course periods in the student's schedule.
  2. Match those periods to the official withdrawal table/calendar.
  3. Use the corresponding deadline.
- Remind students that many official withdrawal deadlines have a maximum time of 6:00 p.m.
- Do not invent refund rules, penalties, exceptions, approvals, or academic consequences unless explicitly provided.

Response style:
- Be concise and student-friendly.
- Use short paragraphs or short numbered steps.
- Prefer practical guidance over policy-heavy explanations.
- Use simple language.
- Always respond in Spanish unless the student writes in English.

Escalation rule:
If the answer is not clearly covered, respond with: "No estoy completamente seguro con la información que tengo. Por favor contacta directamente a la Dirección de Registro o a la Mesa de Ayuda para tu caso específico."

Never do the following:
- Do not invent deadlines.
- Do not invent exceptions or faculty-specific rules.
- Do not promise refunds.
- Do not make up academic consequences.
- Do not say a last-course withdrawal is partial.`;

  const chatWindow = document.getElementById('chat-window');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const conversationHistory = [];

  function scrollToBottom() {
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function addMessage(role, text) {
    const row = document.createElement('div');
    row.className = `message-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'bot' ? 'UA' : 'Tú';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.innerHTML = formatText(text);

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatWindow.appendChild(row);
    scrollToBottom();
  }

  function formatText(text) {
    let html = text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');

    const lines = html.split('\n');
    let result = '';
    let inList = false;

    for (let line of lines) {
      const numbered = line.match(/^\d+\.\s+(.*)/);
      const bullet = line.match(/^[-•]\s+(.*)/);
      if (numbered) {
        if (!inList) { result += '<ol>'; inList = 'ol'; }
        result += `<li>${numbered[1]}</li>`;
      } else if (bullet) {
        if (!inList) { result += '<ul>'; inList = 'ul'; }
        result += `<li>${bullet[1]}</li>`;
      } else {
        if (inList) { result += `</${inList}>`; inList = false; }
        if (line.trim()) result += `<p>${line}</p>`;
      }
    }
    if (inList) result += `</${inList}>`;
    return result;
  }

  function addTypingIndicator() {
    const row = document.createElement('div');
    row.className = 'message-row bot';
    row.id = 'typing-row';
    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.textContent = 'UA';
    const bubble = document.createElement('div');
    bubble.className = 'bubble bot';
    bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
    row.appendChild(avatar);
    row.appendChild(bubble);
    chatWindow.appendChild(row);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  function addSuggestions(questions) {
    const existing = document.getElementById('suggestions-row');
    if (existing) existing.remove();
    const container = document.createElement('div');
    container.className = 'suggestions';
    container.id = 'suggestions-row';
    questions.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'suggestion-btn';
      btn.textContent = q;
      btn.onclick = () => { container.remove(); sendMessage(q); };
      container.appendChild(btn);
    });
    chatWindow.appendChild(container);
    scrollToBottom();
  }

  async function sendMessage(text) {
    const msg = text || userInput.value.trim();
    if (!msg) return;

    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;

    const suggestionsEl = document.getElementById('suggestions-row');
    if (suggestionsEl) suggestionsEl.remove();

    addMessage('user', msg);
    conversationHistory.push({ role: 'user', content: msg });
    addTypingIndicator();

    try {
      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${API_KEY}`
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          max_tokens: 600,
          messages: [
            { role: 'system', content: SYSTEM_PROMPT },
            ...conversationHistory
          ]
        })
      });

      const data = await response.json();
      removeTypingIndicator();

      const reply = data.choices?.[0]?.message?.content || 'Ocurrió un error. Por favor intenta de nuevo.';
      addMessage('bot', reply);
      conversationHistory.push({ role: 'assistant', content: reply });

    } catch (err) {
      removeTypingIndicator();
      addMessage('bot', 'Hubo un problema de conexión. Por favor intenta de nuevo en un momento.');
    }

    sendBtn.disabled = false;
    userInput.focus();
  }

  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  });

  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', () => sendMessage());

  window.addEventListener('load', () => {
    setTimeout(() => {
      addMessage('bot', '¡Hola! Soy el asistente de retiros de la **Universidad de los Andes**.\n\nPuedo ayudarte con retiros parciales o totales de materias, fechas límite, y el proceso en MiBanner.\n\n¿En qué te puedo ayudar?');
      setTimeout(() => {
        addSuggestions([
          '¿Cómo retiro una materia?',
          '¿Qué es un retiro parcial?',
          '¿Cuál es mi fecha límite?',
          '¿Qué pasa si no retiro a tiempo?'
        ]);
      }, 300);
    }, 400);
  });
</script>
</body>
</html>
