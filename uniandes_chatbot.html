<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistente de Retiros — Uniandes</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --surface: #faf9f6;
      --surface2: #efede7;
      --border: #dedad2;
      --text: #1c1a16;
      --text-muted: #7a7568;
      --accent: #c0392b;
      --accent-light: #fdf0ee;
      --accent-mid: #e8998f;
      --bot-bg: #ffffff;
      --user-bg: #1c1a16;
      --user-text: #f5f3ee;
      --radius: 16px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .header-text h1 {
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .header-text p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #27ae60;
      margin-left: auto;
      flex-shrink: 0;
    }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message-row {
      display: flex;
      gap: 10px;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      animation: fadeUp 0.25s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      margin-top: 2px;
    }

    .avatar.bot {
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid var(--accent-mid);
      font-family: 'Sora', sans-serif;
    }

    .avatar.user {
      background: var(--user-bg);
      color: var(--user-text);
    }

    .bubble {
      max-width: calc(100% - 50px);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
    }

    .bubble.bot {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }

    .bubble.user {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .bubble p + p { margin-top: 8px; }
    .bubble strong { font-weight: 500; }
    .bubble a { color: var(--accent); text-decoration: underline; }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 14px 16px;
      align-items: center;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    .suggestions {
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 0 4px;
    }

    .suggestion-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-family: 'Inter', sans-serif;
    }

    .suggestion-btn:hover {
      background: var(--surface2);
      border-color: var(--text-muted);
    }

    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .input-row {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      resize: none;
      min-height: 44px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.5;
    }

    #user-input::placeholder { color: var(--text-muted); }
    #user-input:focus { border-color: var(--accent); }

    #send-btn {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }

    #send-btn:hover { opacity: 0.88; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #send-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .disclaimer {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      max-width: 680px;
      margin-inline: auto;
    }

    @media (max-width: 480px) {
      header { padding: 12px 16px; }
      #chat-window { padding: 16px 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  </div>
  <div class="header-text">
    <h1>Asistente de Retiros</h1>
    <p>Universidad de los Andes · Registro académico</p>
  </div>
  <div class="status-dot"></div>
</header>

<div id="chat-window">
  <!-- Messages injected here -->
</div>

<footer>
  <div class="input-row">
    <textarea id="user-input" placeholder="Escribe tu pregunta aquí..." rows="1"></textarea>
    <button id="send-btn" aria-label="Enviar">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <p class="disclaimer">Este asistente no reemplaza la asesoría oficial de la Dirección de Registro.</p>
</footer>

<script>
  const SYSTEM_PROMPT = `Eres un asistente de soporte para estudiantes de la Universidad de los Andes, especializado en ayudarles a entender cómo realizar retiros de materias o del semestre completo.

Tu rol es dar orientación clara, concisa y precisa basada en las políticas oficiales de la universidad sobre retiros totales y parciales.

=== INFORMACIÓN OFICIAL ===

TIPOS DE RETIRO:

Retiro total:
- El estudiante se sale completamente del semestre (no queda inscrito en ninguna materia).
- Es básicamente "pausar" la universidad por ese semestre.
- Se hace por decisión voluntaria del estudiante.
- Ejemplo: decides no continuar este semestre → retiras TODO.
- IMPORTANTE: Si quieres retirar la última materia que te queda, ya no es un retiro parcial, se convierte automáticamente en un retiro total.

Retiro parcial:
- Retiras una o varias materias, pero te quedas inscrito en al menos una.
- Ajustas tu carga académica sin salirte del semestre.
- Ejemplo: tienes 5 materias → retiras 2 → te quedas con 3.

FECHAS LÍMITE:
- Todas las fechas de retiro dependen del calendario académico del semestre en curso.
- La hora límite siempre es las 6:00 p.m. del día de la fecha máxima.
- Si el estudiante supera la fecha límite: ya no puede retirar (o tiene consecuencias académicas).
- Antes de cierta fecha: puede haber devolución económica.
- Después de esa fecha: ya no hay devolución económica, pero todavía se puede retirar.
- Las fechas exactas dependen del tipo de cursos en los que está inscrito el estudiante.

TIPOS DE CURSOS Y CÓMO AFECTAN LAS FECHAS:
- 8A: cursos del primer ciclo corto (primeras 8 semanas del semestre).
- 8B: cursos del segundo ciclo corto (últimas 8 semanas del semestre).
- 16 semanas: cursos de duración normal del semestre completo.
- 21 semanas: cursos de larga duración.
- El plazo para retirar depende de la combinación de tipos de cursos que tenga el estudiante. Para cursos de 8 semanas el plazo es más corto (aproximadamente semana 5).
- El estudiante debe revisar la tabla de fechas de retiro cruzando sus tipos de cursos para encontrar su fecha límite exacta.

CÓMO HACER EL RETIRO:
- Todo el proceso se realiza en Banner (MiBanner): https://experience.elluciancloud.com/udla
- Es el sistema oficial de la universidad para gestión académica.
- En Banner el estudiante puede: retirar materias individuales, hacer retiro total del semestre, y ver su horario actualizado.
- Siempre se recomienda verificar el horario después de realizar el retiro para confirmar que quedó correctamente.

CONSEJOS IMPORTANTES:
- Si el estudiante no hace nada, queda inscrito y le afecta la nota.
- Siempre verificar el horario después de retirar.
- Para cursos de 8 semanas el plazo es más corto que para los de 16 semanas.

=== FIN DE LA INFORMACIÓN OFICIAL ===

RESPONSABILIDADES:
- Explicar la diferencia entre retiro total y retiro parcial en términos simples.
- Ayudar al estudiante a entender cómo funcionan las fechas límite.
- Guiar sobre cómo interpretar las tablas de fechas según los tipos de cursos.
- Dirigir al estudiante a completar el proceso en Banner / MiBanner.
- Dar orientación práctica paso a paso cuando sea posible.

ESTILO DE COMUNICACIÓN:
- Sé amable, claro y eficiente.
- Evita lenguaje técnico innecesario.
- Usa ejemplos cuando sea útil.
- Respuestas cortas pero informativas.
- Responde siempre en español.

LIMITACIONES:
- No inventes políticas ni fechas específicas que no estén en la información proporcionada.
- Si la pregunta del estudiante depende de detalles personales o académicos específicos no cubiertos: indica claramente que el caso puede variar y recomienda contactar a la universidad.

REGLA DE ESCALACIÓN:
Si la pregunta es poco clara, muy específica, o no está cubierta por la información disponible, responde siempre con algo como: "Para tu caso específico, lo mejor es contactar directamente a la Dirección de Registro o al Help Desk de Uniandes para obtener orientación precisa."`;

  const chatWindow = document.getElementById('chat-window');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const conversationHistory = [];

  function scrollToBottom() {
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function addMessage(role, text) {
    const row = document.createElement('div');
    row.className = `message-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'bot' ? 'UA' : 'Tú';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.innerHTML = formatText(text);

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatWindow.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  function formatText(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>')
      .split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
  }

  function addTypingIndicator() {
    const row = document.createElement('div');
    row.className = 'message-row bot';
    row.id = 'typing-row';

    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.textContent = 'UA';

    const bubble = document.createElement('div');
    bubble.className = 'bubble bot';
    bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;

    row.appendChild(avatar);
    row.appendChild(bubble);
    chatWindow.appendChild(row);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  function addSuggestions(questions) {
    const existing = document.getElementById('suggestions-row');
    if (existing) existing.remove();

    const container = document.createElement('div');
    container.className = 'suggestions';
    container.id = 'suggestions-row';

    questions.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'suggestion-btn';
      btn.textContent = q;
      btn.onclick = () => {
        container.remove();
        sendMessage(q);
      };
      container.appendChild(btn);
    });

    chatWindow.appendChild(container);
    scrollToBottom();
  }

  async function sendMessage(text) {
    const msg = text || userInput.value.trim();
    if (!msg) return;

    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;

    const suggestionsEl = document.getElementById('suggestions-row');
    if (suggestionsEl) suggestionsEl.remove();

    addMessage('user', msg);
    conversationHistory.push({ role: 'user', content: msg });

    addTypingIndicator();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: conversationHistory
        })
      });

      const data = await response.json();
      removeTypingIndicator();

      const reply = data.content?.[0]?.text || 'Ocurrió un error. Por favor intenta de nuevo.';
      addMessage('bot', reply);
      conversationHistory.push({ role: 'assistant', content: reply });

    } catch (err) {
      removeTypingIndicator();
      addMessage('bot', 'Hubo un problema de conexión. Por favor intenta de nuevo en un momento.');
    }

    sendBtn.disabled = false;
    userInput.focus();
  }

  // Auto-resize textarea
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  });

  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', () => sendMessage());

  // Welcome message + suggestions
  window.addEventListener('load', () => {
    setTimeout(() => {
      addMessage('bot', '¡Hola! Soy el asistente de retiros de la **Universidad de los Andes**.\n\nPuedo ayudarte a entender el proceso de retiro parcial o total de materias, fechas límite, y cómo hacerlo en Banner.\n\n¿En qué te puedo ayudar hoy?');
      setTimeout(() => {
        addSuggestions([
          '¿Qué es un retiro parcial?',
          '¿Cómo hago el retiro en Banner?',
          '¿Cuál es la fecha límite?',
          '¿Qué pasa si no retiro a tiempo?'
        ]);
      }, 300);
    }, 400);
  });
</script>
</body>
</html>
